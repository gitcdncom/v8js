name: Build PHP V8 Extension

on:
  workflow_dispatch:

# ==================== 全局公共配置项（完美一键修改） ====================
env:
  # 1. 编译器与 Visual Studio 工具链配置
  VS_VERSION_GN: "2019"         # 传递给 V8 GN 编译参数的 visual_studio_version
  VS_VERSION_ACTION: "2022"     # ilammy/msvc-dev-cmd 镜像版本
  MSVC_TOOLSET: "14.29"         # 强制加载的 MSVC 编译器工具集版本 (VS2019 最终版)

  # 2. 核心源码与开发包远程地址（此后只需维护并修改这 4 行 URL 即可）
  PHP_ZIP_FILE_NAME: "php-devel-pack-8.2.13-Win32-vs16-x64.zip"            # 下载到本地保存的压缩包全名
  PHP_DEVEL_PACK_ORIGINAL_DIR: "php-8.2.13-devel-vs16-x64"            # 解压出来的原始根目录名称
  PHP_DEVEL_PACK_URL: "https://downloads.php.net/~windows/releases/archives/php-devel-pack-8.2.13-Win32-vs16-x64.zip"
  DEPOT_TOOLS_URL: "https://chromium.googlesource.com/chromium/tools/depot_tools.git"
  SDK_BINARYTOOLS_URL: "https://github.com/php/php-sdk-binary-tools.git"
  V8_SRC_URL: "https://chromium.googlesource.com/v8/v8.git"
  V8JS_EXT_URL: "https://github.com/phpv8/v8js.git"

  # 3. 全局本地公共目录定义
  PHP_SDK_ROOT: "C:\\php-sdk"
  PHP_DEV_PACK_DIR: "C:\\php-sdk\\php-dev-pack"
  PHP_DEV_TEMP_DIR: "C:\\php-sdk\\php-dev-temp"
  V8_DEPS_DIR: "D:\\v8-deps"
  V8_DEPS_DIRLIB: "D:\\v8-deps\\lib"
  V8_DEPS_DIRINC: "D:\\v8-deps\\include"
  V8_DEPS_DIRLIB_2: "D:\\v8-deps\\lib\\"
  V8_DEPS_DIRINC_2: "D:\\v8-deps\\include\\"
  V8_PDT: "C:/phpdowtemp"
# ====================================================================

jobs:
  build:
    runs-on: windows-2022
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: "安装依赖"
      shell: powershell
      run: |
        choco install re2c winflexbison3 --yes --no-progress

    # ================= 缓存设置开始 =================
    - name: "缓存"
      id: v8-cache
      uses: actions/cache@v4
      with:
        path: |
          ${{ github.workspace }}/depot_tools
          ${{ github.workspace }}/v8-build
        key: v8-build-cache-${{ runner.os }}-v1
        restore-keys: |
          v8-build-cache-${{ runner.os }}-
    # ================= 缓存设置结束 =================

    - name: "添加 MSVC x64 编译环境"
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64
        vsversion: "${{ env.VS_VERSION_ACTION }}" 
        toolset: "${{ env.MSVC_TOOLSET }}" 

    - name: "配置 Depot Tools 并下载 V8 源码"
      shell: cmd
      run: |
        if not exist "${{ github.workspace }}\depot_tools" (
          git clone ${{ env.DEPOT_TOOLS_URL }} "${{ github.workspace }}\depot_tools"
        )
        set PATH=${{ github.workspace }}\depot_tools;%PATH%
        set DEPOT_TOOLS_WIN_TOOLCHAIN=0
        set GYP_MSVS_VERSION=${{ env.VS_VERSION_GN }}
        
        cd /d "${{ github.workspace }}"
        if not exist "v8-build" (
          mkdir v8-build
          cd v8-build
          call fetch v8
        ) else (
          cd v8-build\v8
          git fetch origin
        )

    - name: "使用 GN 生成 V8 编译配置"
      shell: cmd
      run: |
        set PATH=${{ github.workspace }}\depot_tools;%PATH%
        set DEPOT_TOOLS_WIN_TOOLCHAIN=0
        set GYP_MSVS_VERSION=${{ env.VS_VERSION_GN }}
        
        cd /d "${{ github.workspace }}\v8-build\v8"
        call gn gen out.gn/x64.release --args="v8_enable_shared_ro_heap=true v8_enable_sandbox=false is_debug=false use_custom_libcxx=false is_component_build=false v8_monolithic=true v8_use_external_startup_data=false v8_enable_i18n_support=true v8_enable_webassembly=true treat_warnings_as_errors=false target_cpu=\"x64\" visual_studio_version=\"${{ env.VS_VERSION_GN }}\"" || exit 1

    - name: "编译 V8 静态库"
      shell: cmd
      run: |
        set PATH=${{ github.workspace }}\depot_tools;%PATH%
        cd /d "${{ github.workspace }}\v8-build\v8"
        call ninja -C out.gn/x64.release v8_monolith || exit 1

    - name: "整理 V8 编译产物到 D:\v8-deps"
      shell: cmd
      run: |
        if not exist "${{ env.V8_DEPS_DIRLIB }}" mkdir "${{ env.V8_DEPS_DIRLIB }}"
        if not exist "${{ env.V8_DEPS_DIRINC }}" mkdir "${{ env.V8_DEPS_DIRINC }}"
        
        xcopy /y /s "${{ github.workspace }}\v8-build\v8\include\*" "${{ env.V8_DEPS_DIRINC }}"
        copy /y "${{ github.workspace }}\v8-build\v8\out.gn\x64.release\obj\v8_monolith.lib" "${{ env.V8_DEPS_DIRLIB }}"

    - name: "下载并配置 PHP SDK 与 Dev Pack"
      shell: cmd
      run: |
        if not exist "${{ env.PHP_SDK_ROOT }}" mkdir "${{ env.PHP_SDK_ROOT }}"
        git clone ${{ env.SDK_BINARYTOOLS_URL }} "${{ env.PHP_SDK_ROOT }}\php-sdk-binary-tools"
        
        if not exist "${{ env.V8_PDT }}" mkdir "${{ env.V8_PDT }}"
        powershell -Command "Invoke-WebRequest -Uri '${{ env.PHP_DEVEL_PACK_URL }}' -OutFile '${{ env.V8_PDT }}\${{ env.PHP_ZIP_FILE_NAME }}'"
        powershell -Command "Expand-Archive -Path '${{ env.V8_PDT }}\${{ env.PHP_ZIP_FILE_NAME }}' -DestinationPath '${{ env.V8_PDT }}'"
        
        if not exist "${{ env.PHP_DEV_PACK_DIR }}" mkdir "${{ env.PHP_DEV_PACK_DIR }}"
        xcopy /y /e /e "${{ env.V8_PDT }}\${{ env.PHP_DEVEL_PACK_ORIGINAL_DIR }}\*" "${{ env.PHP_DEV_PACK_DIR }}"

    - name: "下载并编译 V8js 扩展"
      shell: cmd
      run: |
        cd /d "${{ github.workspace }}"
        git clone ${{ env.V8JS_EXT_URL }} v8js
        cd v8js
        
        call "${{ env.PHP_SDK_ROOT }}\php-sdk-binary-tools\phpsdk-vc16-x64.bat" || exit 1
        
        phpize
        call configure --with-v8js="${{ env.V8_DEPS_DIR }}" --with-php-config="${{ env.PHP_DEV_PACK_DIR }}\php-config" || exit 1
        nmake || exit 1

    - name: "上传编译后的 php_v8js.dll"
      uses: actions/artifacts@v4
      with:
        name: php_v8js-dll
        path: ${{ github.workspace }}\v8js\x64\Release\php_v8js.dll
