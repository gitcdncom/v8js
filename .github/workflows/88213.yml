name: Build PHP V8 Extension

on:
  workflow_dispatch:

# ==================== 全局公共配置项（完美一键修改） ====================
env:
  # 1. 编译器与 Visual Studio 工具链配置
  VS_VERSION_GN: "2019"         # 传递给 V8 GN 编译参数的 visual_studio_version
  VS_VERSION_ACTION: "2022"     # ilammy/msvc-dev-cmd 镜像版本
  MSVC_TOOLSET: "14.29"         # 强制加载的 MSVC 编译器工具集版本 (VS2019 最终版)

  # 2. 核心源码与开发包远程地址
  PHP_ZIP_FILE_NAME: "php-devel-pack-8.2.13-Win32-vs16-x64.zip"
  PHP_DEVEL_PACK_ORIGINAL_DIR: "php-8.2.13-devel-vs16-x64"
  PHP_DEVEL_PACK_URL: "https://downloads.php.net/~windows/releases/archives/php-devel-pack-8.2.13-Win32-vs16-x64.zip"
  DEPOT_TOOLS_URL: "https://chromium.googlesource.com/chromium/tools/depot_tools.git"
  SDK_BINARYTOOLS_URL: "https://github.com/php/php-sdk-binary-tools.git"
  V8_SRC_URL: "https://chromium.googlesource.com/v8/v8.git"
  V8JS_EXT_URL: "https://github.com/phpv8/v8js.git"
  V8_VERSION: "11.8.172"        # 明确指定 V8 的版本或分支，确保编译稳定性

  # 3. 全局本地公共目录定义
  PHP_SDK_ROOT: "D:\\php-sdk"
  PHP_DEV_PACK_DIR: "D:\\php-sdk\\php-dev-pack"
  V8_DEPS_DIR: "D:\\v8-deps"
# ====================================================================

jobs:
  build:
    runs-on: windows-2022
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: "安装系统依赖"
      run: |
        choco install re2c winflexbison3 --yes --no-progress

    - name: "缓存设置"
      id: v8-cache
      uses: actions/cache@v4
      with:
        path: |
          ${{ github.workspace }}/depot_tools
          ${{ github.workspace }}/v8-build
        key: v8-build-cache-${{ runner.os }}-v1
        restore-keys: |
          v8-build-cache-${{ runner.os }}-

    - name: "添加 MSVC x64 编译环境"
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64
        vsversion: "${{ env.VS_VERSION_ACTION }}"
        toolset: "${{ env.MSVC_TOOLSET }}"

    - name: "配置 Depot Tools 与 PHP SDK 目录"
      run: |
        # 创建全局目录
        New-Item -ItemType Directory -Force -Path "${{ env.PHP_SDK_ROOT }}"
        New-Item -ItemType Directory -Force -Path "${{ env.PHP_DEV_PACK_DIR }}"
        New-Item -ItemType Directory -Force -Path "${{ env.V8_DEPS_DIR }}"
        
        # 配置 Depot Tools 环境变量
        echo "${{ github.workspace }}/depot_tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        echo "DEPOT_TOOLS_WIN_TOOLCHAIN=0" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        echo "GYP_MSVS_VERSION=${{ env.VS_VERSION_GN }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: "同步 Depot Tools 脚本"
      if: steps:v8-cache.outputs.cache-hit != 'true'
      run: |
        git clone ${{ env.DEPOT_TOOLS_URL }} ${{ github.workspace }}/depot_tools

    - name: "拉取并编译 V8 引擎"
      run: |
        # 强制配置 gclient 使用本地 VS 编译
        $env:DEPOT_TOOLS_WIN_TOOLCHAIN=0
        $env:GYP_MSVS_VERSION="${{ env.VS_VERSION_GN }}"
        
        cd ${{ github.workspace }}
        if (-not (Test-Path "v8-build")) {
            New-Item -ItemType Directory -Path "v8-build"
        }
        cd v8-build
        
        # 初始化与同步 V8 源码
        if (-not (Test-Path "v8")) {
            gclient config --name=v8 ${{ env.V8_SRC_URL }}
            gclient sync --revision=${{ env.V8_VERSION }}
        } else {
            gclient sync
        }
        
        # 使用 GN 生成编译配置文件
        cd v8
        gn gen out.gn/x64.release --args="is_debug=false target_cpu=\"x64\" visual_studio_version=\"${{ env.VS_VERSION_GN }}\" v8_monolithic=true v8_use_external_startup_data=false is_component_build=false"
        
        # 开始编译 V8 静态单体库
        ninja -C out.gn/x64.release v8_monolith

    - name: "整理 V8 编译产物到依赖目录"
      run: |
        # 创建头文件及库文件目录
        New-Item -ItemType Directory -Force -Path "${{ env.V8_DEPS_DIR }}\include"
        New-Item -ItemType Directory -Force -Path "${{ env.V8_DEPS_DIR }}\lib"
        
        # 复制头文件
        Copy-Item -Path "${{ github.workspace }}\v8-build\v8\include\*" -Destination "${{ env.V8_DEPS_DIR }}\include" -Recurse -Force
        # 复制生成的静态库 v8_monolith.lib
        Copy-Item -Path "${{ github.workspace }}\v8-build\v8\out.gn\x64.release\obj\v8_monolith.lib" -Destination "${{ env.V8_DEPS_DIR }}\lib\" -Force

    - name: "配置 PHP 开发包 (php-devel-pack)"
      run: |
        cd ${{ env.PHP_SDK_ROOT }}
        Invoke-WebRequest -Uri "${{ env.PHP_DEVEL_PACK_URL }}" -OutFile "${{ env.PHP_ZIP_FILE_NAME }}"
        Expand-Archive -Path "${{ env.PHP_ZIP_FILE_NAME }}" -DestinationPath "temp_extract"
        
        # 将解压内容移动到统一定义的 env.PHP_DEV_PACK_DIR
        Move-Item -Path "temp_extract\${{ env.PHP_DEVEL_PACK_ORIGINAL_DIR }}\*" -Destination "${{ env.PHP_DEV_PACK_DIR }}" -Force
        Remove-Item -Recurse -Force "temp_extract", "${{ env.PHP_ZIP_FILE_NAME }}"

    - name: "拉取并编译 V8js PHP 扩展"
      run: |
        cd ${{ github.workspace }}
        git clone ${{ env.V8JS_EXT_URL }} v8js
        cd v8js
        
        # 使用 PHP 开发包中的 phpize 释放 php 编译配置（Windows 上通常通过 config.w32 配置）
        # 传入 V8 依赖库路径和 PHP 开发包路径进行构建
        & "${{ env.PHP_DEV_PACK_DIR }}\phpize.bat"
        
        # 执行配置，指定 V8 库和头文件路径
        # 注意：Windows 动态扩展编译通常需要借助 php-sdk-binary-tools 的构建环境，此处直接使用 phpize 生成的本地配置
        .\configure.bat --with-v8js="${{ env.V8_DEPS_DIR }}" --with-php-build="${{ env.PHP_DEV_PACK_DIR }}"
        
        # 执行编译
        nmake

    - name: "收集并上传构建产物 (php_v8js.dll)"
      uses: actions/upload-artifact@v4
      with:
        name: php_v8js-php8.2.13-vs16-x64
        path: |
          ${{ github.workspace }}/v8js/x64/Release/php_v8js.dll
