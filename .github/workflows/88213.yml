name: Build PHP V8 Extension

on:
  workflow_dispatch:

# ==================== 全局公共配置项（完美一键修改） ====================
env:
  # 1. 编译器与 Visual Studio 工具链配置
  VS_VERSION_GN: "2019"         # 传递给 V8 GN 编译参数的 visual_studio_version
  VS_VERSION_ACTION: "2022"     # ilammy/msvc-dev-cmd 镜像版本
  MSVC_TOOLSET: "14.29"         # 强制加载的 MSVC 编译器工具集版本 (VS2019 最终版)

  # 2. 核心源码与开发包远程地址
  PHP_ZIP_FILE_NAME: "php-devel-pack-8.2.13-Win32-vs16-x64.zip"            # 下载到本地保存的压缩包全名
  PHP_DEVEL_PACK_ORIGINAL_DIR: "php-8.2.13-devel-vs16-x64"            # 解压出来的原始根目录名称
  PHP_DEVEL_PACK_URL: "https://downloads.php.net/~windows/releases/archives/php-devel-pack-8.2.13-Win32-vs16-x64.zip"
  DEPOT_TOOLS_URL: "https://chromium.googlesource.com/chromium/tools/depot_tools.git"
  SDK_BINARYTOOLS_URL: "https://github.com/php/php-sdk-binary-tools.git"
  V8_SRC_URL: "https://chromium.googlesource.com/v8/v8.git"
  V8JS_EXT_URL: "https://github.com/phpv8/v8js.git"

  # 3. 全局本地公共目录定义
  # 注意：在 GitHub Actions Windows 节点中，D 盘空间通常比 C 盘更充裕，建议拉取和编译均在 D 盘进行
  PHP_SDK_ROOT: "D:\\php-sdk"
  PHP_DEV_PACK_DIR: "D:\\php-sdk\\php-dev-pack"
  V8_DEPS_DIR: "D:\\v8-deps"
  
  # Depot Tools 依赖的环境变量
  DEPOT_TOOLS_WIN_TOOLCHAIN: "0"
# ====================================================================

jobs:
  build:
    runs-on: windows-2022
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: "安装基础依赖"
      shell: powershell
      run: |
        choco install re2c winflexbison3 --yes --no-progress

    - name: "缓存 Depot Tools & V8 源码"
      id: v8-cache
      uses: actions/cache@v4
      with:
        path: |
          D:\depot_tools
          D:\v8
         # D:\.gclient
         # D:\.gclient_entries
        key: v8-build-cache-${{ runner.os }}-v1
        restore-keys: |
          v8-build-cache-${{ runner.os }}-

    - name: "添加 MSVC x64 编译环境"
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64
        vsversion: "${{ env.VS_VERSION_ACTION }}" 
        toolset: "${{ env.MSVC_TOOLSET }}"

    - name: "配置 Depot Tools"
      shell: cmd
      run: |
        :: 【精准修复】强制写入全局配置，物理生成 .gitconfig 文件，彻底击碎 Git 128 致命阻断
        call git config --global user.name "runner"
        call git config --global depot-tools.allowGlobalGitConfig false
        if not exist D:\depot_tools (
         git clone --depth=1 ${{ env.DEPOT_TOOLS_URL }} D:\depot_tools
        )
        set DEPOT_TOOLS_UPDATE=0
        set "PATH=D:\depot_tools;%PATH%"

        cd /d D:\
        echo solutions = [ { 'name': 'v8', 'url': '${{ env.V8_SRC_URL }}', 'deps_file': 'DEPS', 'managed': False, 'custom_deps': {}, 'custom_vars': {} } ] > .gclient

        :: 【精准修复】改用符合新版规范的探测命令，确保平稳触发后台编译组件下载并成功返回
        call gclient help

    - name: "同步 V8 源码"
      shell: cmd
      run: |
        set "PATH=D:\depot_tools;%PATH%"
        if not exist D:\v8\.git (
          echo [WARNING] 历史恢复路径严重断裂或非合规残缺包，正在清洗配置残留...
          if exist D:\.gclient del /f /q D:\.gclient
          if exist D:\.gclient_entries del /f /q D:\.gclient_entries
        )
        if not exist D:\v8 (
          cd /d D:\
          call fetch v8
        )
        copy /Y D:\.gclient D:\v8\.gclient
        cd /d D:\v8
        call git fetch origin
        call git checkout lkgr
        call gclient sync

    - name: "编译 V8 引擎静态库"
      shell: cmd
      run: |
        set "PATH=D:\depot_tools;%PATH%"
        cd /d D:\v8
        call gn gen out.gn/x64.release --args="is_debug=false is_component_build=false v8_monolithic=true v8_use_external_startup_data=false v8_enable_i18n_support=true v8_enable_webassembly=true treat_warnings_as_errors=false target_cpu=\"x64\" visual_studio_version=\"${{ env.VS_VERSION_GN }}\""
        call ninja -C out.gn/x64.release v8_monolith

    - name: "提取并组织 V8 编译产物"
      shell: cmd
      run: |
        if not exist "${{ env.V8_DEPS_DIR }}\include" mkdir "${{ env.V8_DEPS_DIR }}\include"
        if not exist "${{ env.V8_DEPS_DIR }}\lib" mkdir "${{ env.V8_DEPS_DIR }}\lib"
        xcopy /E /I /Y "D:\v8\include" "${{ env.V8_DEPS_DIR }}\include"
        xcopy /Y "D:\v8\out.gn\x64.release\obj\v8_monolith.lib" "${{ env.V8_DEPS_DIR }}\lib\"

    - name: "配置 PHP SDK 环境与安装包"
      shell: cmd
      run: |
        if not exist "${{ env.PHP_SDK_ROOT }}" mkdir "${{ env.PHP_SDK_ROOT }}"
        if not exist "${{ env.PHP_SDK_ROOT }}\bin" git clone --depth=1 ${{ env.SDK_BINARYTOOLS_URL }} "${{ env.PHP_SDK_ROOT }}\bin"
        
        :: 1. 强力防御清洗旧包，通过临时过渡目录解压，完美剥离官方带版本号的文件夹外壳
        if exist "${{ env.PHP_DEV_PACK_DIR }}" rd /s /q "${{ env.PHP_DEV_PACK_DIR }}"
        mkdir "${{ env.PHP_DEV_PACK_DIR }}"
        
        if exist "D:\php-sdk\php-dev-pack-tmp" rd /s /q "D:\php-sdk\php-dev-pack-tmp"
        mkdir "D:\php-sdk\php-dev-pack-tmp"
        
        curl -Lo "D:\php-sdk\php-dev-pack-tmp\${{ env.PHP_ZIP_FILE_NAME }}" "${{ env.PHP_DEVEL_PACK_URL }}"
        powershell -Command "Expand-Archive -Path 'D:\php-sdk\php-dev-pack-tmp\${{ env.PHP_ZIP_FILE_NAME }}' -DestinationPath 'D:\php-sdk\php-dev-pack-tmp' -Force"
        
        :: 2. 将解压出来的最内层核心数据，直接改名并挪移到变量规定的 \php-devel-pack 嵌套子目录下
        move "D:\php-sdk\php-dev-pack-tmp\${{ env.PHP_DEVEL_PACK_ORIGINAL_DIR }}" "${{ env.PHP_DEV_PACK_DIR }}\php-devel-pack"
        rd /s /q "D:\php-sdk\php-dev-pack-tmp"

    - name: "拉取并编译 V8js 扩展"
      shell: cmd
      run: |
        set "PATH=D:\depot_tools;${{ env.PHP_SDK_ROOT }}\bin;${{ env.PHP_SDK_ROOT }}\msys2\usr\bin;%PATH%"
        
        :: 🚀 【降维代替 git clone】全面清除脆弱的 git 句柄大坑！改用 100% 纯单线程、绝对不霸占控制台的 ZIP 直连下载
        if exist D:\v8js-tmp rd /s /q D:\v8js-tmp
        mkdir D:\v8js-tmp
        curl -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" -Lo D:\v8js-tmp\v8js.zip "https://github.com"
        powershell -Command "Expand-Archive -Path 'D:\v8js-tmp\v8js.zip' -DestinationPath 'D:\v8js-tmp' -Force"
        
        if exist D:\v8js rd /s /q D:\v8js
        move "D:\v8js-tmp\v8js-master" "D:\v8js"
        rd /s /q D:\v8js-tmp
        
        cd /d D:\v8js
        if not exist "D:\v8js\x64\Release" mkdir "D:\v8js\x64\Release"
        
        :: 🛠️ 亲手绘制绝对对齐所有磁盘路径、且定向输出至 x64\Release\ 的终极固化 Makefile 施工图纸
        echo CC=cl > Makefile
        echo LD=link >> Makefile
        echo CFLAGS=/nologo /MD /O2 /wd4005 /I"D:\php-sdk\php-dev-pack\php-devel-pack\include" /I"D:\php-sdk\php-dev-pack\php-devel-pack\include\main" /I"D:\php-sdk\php-dev-pack\php-devel-pack\include\Zend" /I"D:\v8-deps\include" /D"WIN32" /D"_AMD64_" /D"PHP_WIN32" /D"ZEND_WIN32" /D"ZTS=1" /D"ZEND_DEBUG=0" /D"COMPILE_DL_V8JS" /D"_WIN32_WINNT=0x0A00" >> Makefile
        echo LDFLAGS=/nologo /dll /libpath:"D:\php-sdk\php-dev-pack\php-devel-pack\lib" /libpath:"D:\v8-deps\lib" >> Makefile
        echo LIBS=php8ts.lib v8_monolith.lib advapi32.lib user32.lib ole32.lib oleaut32.lib ws2_32.lib winmm.lib dbghelp.lib shlwapi.lib >> Makefile
        
        :: 精准对齐 phpv8/v8js 官方主仓最新包含的 13 个核心 C++ 组件进行编译映射
        echo OBJS=x64\Release\v8js_array_access.obj x64\Release\v8js_class.obj x64\Release\v8js_commonjs.obj x64\Release\v8js_convert.obj x64\Release\v8js_exceptions.obj x64\Release\v8js_generator_export.obj x64\Release\v8js_main.obj x64\Release\v8js_methods.obj x64\Release\v8js_object_export.obj x64\Release\v8js_timer.obj x64\Release\v8js_v8.obj x64\Release\v8js_v8object_class.obj x64\Release\v8js_variables.obj >> Makefile
        
        echo D:\v8js\x64\Release\php_v8js.dll: $(OBJS) >> Makefile
        echo 	$(LD) $(LDFLAGS) /out:D:\v8js\x64\Release\php_v8js.dll $(OBJS) $(LIBS) >> Makefile
        
        :: 显式编译重定向块图纸
        echo x64\Release\v8js_array_access.obj: v8js_array_access.cc >> Makefile
        echo 	$(CC) $(CFLAGS) /Fo"x64\Release\v8js_array_access.obj" /c v8js_array_access.cc >> Makefile
        echo x64\Release\v8js_class.obj: v8js_class.cc >> Makefile
        echo 	$(CC) $(CFLAGS) /Fo"x64\Release\v8js_class.obj" /c v8js_class.cc >> Makefile
        echo x64\Release\v8js_commonjs.obj: v8js_commonjs.cc >> Makefile
        echo 	$(CC) $(CFLAGS) /Fo"x64\Release\v8js_commonjs.obj" /c v8js_commonjs.cc >> Makefile
        echo x64\Release\v8js_convert.obj: v8js_convert.cc >> Makefile
        echo 	$(CC) $(CFLAGS) /Fo"x64\Release\v8js_convert.obj" /c v8js_convert.cc >> Makefile
        echo x64\Release\v8js_exceptions.obj: v8js_exceptions.cc >> Makefile
        echo 	$(CC) $(CFLAGS) /Fo"x64\Release\v8js_exceptions.obj" /c v8js_exceptions.cc >> Makefile
        echo x64\Release\v8js_generator_export.obj: v8js_generator_export.cc >> Makefile
        echo 	$(CC) $(CFLAGS) /Fo"x64\Release\v8js_generator_export.obj" /c v8js_generator_export.cc >> Makefile
        echo x64\Release\v8js_main.obj: v8js_main.cc >> Makefile
        echo 	$(CC) $(CFLAGS) /Fo"x64\Release\v8js_main.obj" /c v8js_main.cc >> Makefile
        echo x64\Release\v8js_methods.obj: v8js_methods.cc >> Makefile
        echo 	$(CC) $(CFLAGS) /Fo"x64\Release\v8js_methods.obj" /c v8js_methods.cc >> Makefile
        echo x64\Release\v8js_object_export.obj: v8js_object_export.cc >> Makefile
        echo 	$(CC) $(CFLAGS) /Fo"x64\Release\v8js_object_export.obj" /c v8js_object_export.cc >> Makefile
        echo x64\Release\v8js_timer.obj: v8js_timer.cc >> Makefile
        echo 	$(CC) $(CFLAGS) /Fo"x64\Release\v8js_timer.obj" /c v8js_timer.cc >> Makefile
        echo x64\Release\v8js_v8.obj: v8js_v8.cc >> Makefile
        echo 	$(CC) $(CFLAGS) /Fo"x64\Release\v8js_v8.obj" /c v8js_v8.cc >> Makefile
        echo x64\Release\v8js_v8object_class.obj: v8js_v8object_class.cc >> Makefile
        echo 	$(CC) $(CFLAGS) /Fo"x64\Release\v8js_v8object_class.obj" /c v8js_v8object_class.cc >> Makefile
        echo x64\Release\v8js_variables.obj: v8js_variables.cc >> Makefile
        echo 	$(CC) $(CFLAGS) /Fo"x64\Release\v8js_variables.obj" /c v8js_variables.cc >> Makefile
        
        echo all: D:\v8js\x64\Release\php_v8js.dll >> Makefile
        
        :: 🚀 绕过所有黑盒假死内鬼，微软 C++ 原生编译器无阻力开轰！
        nmake all

    - name: "上传编译产物 (php_v8js.dll)"
      uses: actions/upload-artifact@v4
      with:
        name: php_v8js-dll
        path: D:\v8js\x64\Release*\*
