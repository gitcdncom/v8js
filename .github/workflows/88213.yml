name: Build PHP V8 Extension

on:
  workflow_dispatch:

# ==================== 全局公共配置项（完美一键修改） ====================
env:
  # 1. 编译器与 Visual Studio 工具链配置
  VS_VERSION_GN: "2019"         # 传递给 V8 GN 编译参数的 visual_studio_version
  VS_VERSION_ACTION: "2022"     # ilammy/msvc-dev-cmd 镜像版本
  MSVC_TOOLSET: "14.29"         # 强制加载的 MSVC 编译器工具集版本 (VS2019 最终版)

  # 2. 核心源码与开发包远程地址（此后只需维护并修改这 4 行 URL 即可）
  PHP_ZIP_FILE_NAME: "php-devel-pack-8.2.13-Win32-vs16-x64.zip"            # 下载到本地保存的压缩包全名
  PHP_DEVEL_PACK_ORIGINAL_DIR: "php-8.2.13-devel-vs16-x64"            # 解压出来的原始根目录名称
  PHP_DEVEL_PACK_URL: "https://downloads.php.net/~windows/releases/archives/php-devel-pack-8.2.13-Win32-vs16-x64.zip"
  DEPOT_TOOLS_URL: "https://chromium.googlesource.com/chromium/tools/depot_tools.git"
  SDK_BINARYTOOLS_URL: "https://github.com/php/php-sdk-binary-tools.git"
  V8_SRC_URL: "https://chromium.googlesource.com/v8/v8.git"
  V8JS_EXT_URL: "https://github.com/phpv8/v8js.git"

  # 3. 全局本地公共目录定义
  PHP_SDK_ROOT: "C:\\php-sdk"
  PHP_DEV_PACK_DIR: "C:\\php-sdk\\php-dev-pack"
  PHP_DEV_TEMP_DIR: "C:\\php-sdk\\php-dev-temp"
  V8_DEPS_DIR: "D:\\v8-deps"
  V8_DEPS_DIRLIB: "D:\\v8-deps\\lib"
  V8_DEPS_DIRINC: "D:\\v8-deps\\include"
  V8_DEPS_DIRLIB_2: "D:\\v8-deps\\lib\\"
  V8_DEPS_DIRINC_2: "D:\\v8-deps\\include\\"
  V8_PDT: "C:/phpdowtemp"
# ====================================================================

jobs:
  build:
    runs-on: windows-2022
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: "安装依赖"
      run: |
        #choco install git totalcmd -y
        #choco install re2c winflexbison3 --yes --no-progress
        #choco install git python3 totalcmd -y
        Write-Host "=========================================="
        Write-Host "【提示】未配置或无需配置！"
        Write-Host "=========================================="

    # ================= 缓存设置开始 =================
    # 移除具体的 github.sha，使用更宽泛的 key 以支持缓存复用
    - name: "缓存"
      id: v8-cache
      uses: actions/cache@v4
      with:
        path: |
          ${{ github.workspace }}/depot_tools
          ${{ github.workspace }}/v8-build
        key: v8-build-cache-${{ runner.os }}-v1
        restore-keys: |
          v8-build-cache-${{ runner.os }}-
    # ================= 缓存设置结束 =================

    - name: "添加 MSVC x64 编译环境"
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64
        vsversion: "${{ env.VS_VERSION_ACTION }}" # 必须改为Visual Studio 2019 (VS16)，从而完美匹配 php-8.2.13-Win32-vs16|允许加载 windows-2022 镜像中原生拥有的 VS2022 环境
        toolset: "${{ env.MSVC_TOOLSET }}" # 强制加载 MSVC v142 (即 VS2019) 编译器|对应的 Microsoft Visual C++ 编译器工具集版本|VS 2019 最终更新 (16.11): _MSC_VER == 1929 (MSVC 14.29)

    - name: "下载并安装 Depot Tools（谷歌编译工具）"
      shell: bash
      run: |
        FIXED_WORKSPACE=$(echo "$GITHUB_WORKSPACE" | sed 's/\\/\//g')
        TARGET_DIR="$FIXED_WORKSPACE/depot_tools"
        
        if [ ! -d "$TARGET_DIR/.git" ]; then
          echo "Directory or .git does not exist. Cloning depot_tools..."
          rm -rf "$TARGET_DIR"
          git clone "${{ env.DEPOT_TOOLS_URL }}" "$TARGET_DIR"
        else
          echo "depot_tools already exists, skipping clone."
          # 【核心修复】如果命中了缓存，显式调用其自带的更新脚本来刷新 Windows 环境下的二进制工具
          # cd "$TARGET_DIR"
          # ./update_depot_tools || true
          # 不拉取最新工具箱源码，仅用 3 秒钟在 Windows 本地原地重新纠正、激活 Python 坏死的路径环境
          cd "$TARGET_DIR"
          cmd.exe /c "gclient" || true
        fi
        echo "$TARGET_DIR" >> $GITHUB_PATH

    - name: "获取 V8 源代码"
      shell: bash
      env:
        DEPOT_TOOLS_WIN_TOOLCHAIN: 0
        WINDOWSSDKDIR: ${{ env.WindowsSdkDir }}
      run: |
        # 1. 纠正并声明跨平台正斜杠路径
        FIXED_WORKSPACE=$(echo "$GITHUB_WORKSPACE" | sed 's/\\/\//g')
        export PATH="$FIXED_WORKSPACE/depot_tools:$PATH"
        
        # 2. 注入谷歌专用的 Git 防冲突全局配置
        git config --global depot-tools.allowGlobalGitConfig true
        git config --global core.autocrlf false
        git config --global core.filemode false
        
        # 3. 创建顶层大包装盒 v8-build 并切入
        mkdir -p "$FIXED_WORKSPACE/v8-build"
        cd "$FIXED_WORKSPACE/v8-build"
        
        # 【核心自愈修复：彻底解决跨虚拟机绝对路径污染】
        echo "写入当前虚拟机专属的构建配置文件..."
        echo "solutions = [ { 'name': 'v8', 'url': '${{ env.V8_SRC_URL }}', 'deps_file': 'DEPS', 'managed': False, 'custom_deps': {}, 'custom_vars': {} } ]" > .gclient
        
        # 4. 执行依赖链校验（完美兼容缓存复用，绝不污染版本 --freeze --nohooks）
        echo "启动 V8 依赖链增量自检..."
        gclient sync --no-history
        
        # 5. 执行钩子程序（刷新当前虚拟机的本地编译工具图纸）
        echo "激活 V8 本地构建钩子..."
        gclient runhooks

    - name: "编译 V8"
      shell: cmd
      env:
        DEPOT_TOOLS_WIN_TOOLCHAIN: 0
      run: |
        set "PATH=%GITHUB_WORKSPACE%\depot_tools;%PATH%"
        set "PYTHONPATH=%GITHUB_WORKSPACE%\depot_tools"
        cd /d "%GITHUB_WORKSPACE%\v8-build\v8"
        call set "PATH=%cd%\buildtools\win;%PATH%"
        :: is_custom_libcxx=false use_custom_libcxx=false visual_studio_version="2019" v8_enable_sandbox
        call gn gen out.gn/x64.release --args="is_debug=false is_component_build=false v8_monolithic=true v8_use_external_startup_data=false v8_enable_i18n_support=true v8_enable_webassembly=true treat_warnings_as_errors=false target_cpu=\"x64\"" || exit 1
        ninja -C out.gn\x64.release v8_monolith || exit 1

    - name: "安装 PHP-SDK 并拉取 PHP 开发包"
      shell: powershell
      run: |
        if (-not (Test-Path "${{ env.PHP_SDK_ROOT }}")) {
            git clone "${{ env.SDK_BINARYTOOLS_URL }}" "${{ env.PHP_SDK_ROOT }}"
        }
        
        $downloadDir = New-Item -ItemType Directory -Force -Path "${{ env.V8_PDT }}"
        cd $downloadDir.FullName
        
        Invoke-WebRequest -Uri "${{ env.PHP_DEVEL_PACK_URL }}" -OutFile "${{ env.PHP_ZIP_FILE_NAME }}"
        if (Test-Path "${{ env.PHP_DEV_TEMP_DIR }}") {
            Remove-Item -Recurse -Force "${{ env.PHP_DEV_TEMP_DIR }}"
        }
        Expand-Archive -Path "${{ env.PHP_ZIP_FILE_NAME }}" -DestinationPath "${{ env.PHP_DEV_TEMP_DIR }}" -Force
        if (Test-Path "${{ env.PHP_DEV_PACK_DIR }}") {
            Remove-Item -Recurse -Force "${{ env.PHP_DEV_PACK_DIR }}"
        }

        $primaryPath = Join-Path "${{ env.PHP_DEV_TEMP_DIR }}" "${{ env.PHP_DEVEL_PACK_ORIGINAL_DIR }}"
        $finalTargetDir = $null

        if (Test-Path $primaryPath) {
            Write-Host "[Mode 1] Successfully matched predefined path: $primaryPath"
            $finalTargetDir = Get-Item $primaryPath
        } else {
            Write-Warning "[Mode 2] Predefined path not found. Starting auto detection..."
            $finalTargetDir = Get-ChildItem -Path "${{ env.PHP_DEV_TEMP_DIR }}" | Where-Object { 
                $_.PSIsContainer -and (Test-Path (Join-Path $_.FullName "phpize.bat"))
            } | Select-Object -First 1
        }

        if ($null -eq $finalTargetDir) {
            Write-Error "[FATAL ERROR] PHP development pack could not be located!"
            exit 1
        }
        
        Write-Host "Moving core package from: $($finalTargetDir.FullName)"
        Move-Item -Path $finalTargetDir.FullName -Destination "${{ env.PHP_DEV_PACK_DIR }}" -Force

    - name: "为 PHP 扩展准备 V8 依赖库"
      shell: cmd
      run: |
        cd /d "%GITHUB_WORKSPACE%\v8-build\v8"
        if exist "${{ env.V8_DEPS_DIR }}" rmdir /S /Q "${{ env.V8_DEPS_DIR }}"
        mkdir "${{ env.V8_DEPS_DIRLIB }}"
        mkdir "${{ env.V8_DEPS_DIRINC }}"
        xcopy /S /E /Y /I "include\*" "${{ env.V8_DEPS_DIRINC_2 }}"
        copy /Y "out.gn\x64.release\obj\v8_monolith.lib" "${{ env.V8_DEPS_DIRLIB_2 }}"
        copy /Y "out.gn\x64.release\obj\v8_monolith.lib" "${{ env.V8_DEPS_DIRLIB }}\v8.lib"
        if exist out.gn\x64.release\icudtl.dat copy /Y "out.gn\x64.release\icudtl.dat" "${{ env.V8_DEPS_DIRLIB_2 }}"
        if exist out.gn\x64.release\snapshot_blob.bin copy /Y "out.gn\x64.release\snapshot_blob.bin" "${{ env.V8_DEPS_DIRLIB_2 }}"

    - name: "克隆 PHP V8Js 扩展源码"
      shell: cmd
      run: |
        if not exist "${{ env.PHP_DEV_PACK_DIR }}" (
          echo 【致命错误】系统未检测到完整的 PHP 开发包目录！说明上游下载解压步骤已翻车，请检查网络或盘符！
          exit 1
        )
        cd /d "${{ env.PHP_DEV_PACK_DIR }}"
        if not exist ext mkdir ext
        if exist ext\v8js rmdir /S /Q ext\v8js
        git clone "${{ env.V8JS_EXT_URL }}" ext\v8js

# 将设置变量与构建脚本合并在单步骤的同一个上下文执行，避免环境变量在步骤间丢失
    - name: "配置 PHP 编译环境"
      shell: cmd
      run: |
        :: 1. 注入工具链并切入 PHP 开发包主目录
        set "PATH=${{ env.PHP_SDK_ROOT }}\bin;%PATH%"
        cd /d "${{ env.PHP_DEV_PACK_DIR }}"
        
        :: 2. 【核心去锁修复】安全可靠的代码获取逻辑：绝不在原位进行带有交互风险的 git clone
        if exist "%GITHUB_WORKSPACE%\ext\v8js" (
            echo [INFO] Syncing custom source from workspace...
            if not exist "ext\v8js" mkdir "ext\v8js"
            xcopy "%GITHUB_WORKSPACE%\ext\v8js\*" "ext\v8js\\" /S /E /Y /I
        ) else (
            echo [INFO] Workspace empty. Safe-fetching from remote to a clean temp directory...
            :: 清理可能残留的临时克隆夹
            if exist "%TEMP%\v8js-remote" rmdir /S /Q "%TEMP%\v8js-remote"
            :: 在绝对安全的系统临时目录下克隆源码，规避任何可能的文件句柄死锁
            git clone --depth=1 "${{ env.V8JS_EXT_URL }}" "%TEMP%\v8js-remote"
            
            :: 将克隆完的完整源码强行搬运覆盖到 PHP 的 ext 树下
            if not exist "ext\v8js" mkdir "ext\v8js"
            xcopy "%TEMP%\v8js-remote\*" "ext\v8js\\" /S /E /Y /I
            
            :: 随手销毁临时无用夹
            rmdir /S /Q "%TEMP%\v8js-remote"
        )
        
        :: 3. 物理擦除 v8js 内部由于全局扫描而引发的硬编码错误
        powershell -Command "$p = 'ext\v8js\config.w32'; $c = [System.IO.File]::ReadAllText($p); $s = $c -replace 'if\s*\(\s*typeof\(BUILD_DIR\)[^}]+}', 'INFO(\"Bypassed hardcoded directory check.\");'; [System.IO.File]::WriteAllText($p, $s)"
        
        :: 4. 将 ARG_ENABLE 转换为 ARG_WITH，从而激活 --with-v8-dir 参数
        powershell -Command "(Get-Content 'ext\v8js\config.w32') -replace 'ARG_ENABLE', 'ARG_WITH' | Set-Content 'ext\v8js\config.w32'"
        
        :: 5. 强制清除前面所有隐藏的非零错误状态，防止假熔断
        cmd /c "(exit /b 0)"
        
        :: 6. 执行 phpize.bat 生成最初步的配置（在当前目录下生成 configure.bat）
        echo [INFO] Rebuilding configure scripts...
        call phpize.bat
        
        :: 7. 再次强制归零状态码
        cmd /c "(exit /b 0)"
        
        :: 8. 启动配置图纸生成
        echo [INFO] Running configure.bat...
        call configure.bat --with-v8js=shared --with-v8-dir="${{ env.V8_DEPS_DIR }}" --enable-debug=no "BUILD_DIR=release"
        if %ERRORLEVEL% neq 0 (
            echo 【致命错误】configure.bat 返回了真实的失败状态码！
            exit /b %ERRORLEVEL%
        )
        
        :: 9. 验证大图纸是否成功生成
        if exist "Makefile" (
            echo [SUCCESS] 全局 Makefile 编译大图纸已完美就位！
            exit /b 0
        )
        
        if exist "ext\v8js\Makefile" (
            move /Y "ext\v8js\Makefile" "Makefile"
            exit /b 0
        )
        
        echo 【致命错误】未能成功生成 Makefile 构建图纸！
        exit /b 1

    - name: "运行 NMAKE 编译"
      shell: cmd
      run: |
        set "PATH=${{ env.PHP_SDK_ROOT }}\bin;%PATH%"
        cd /d "${{ env.PHP_SDK_ROOT }}"
        if exist bin\phpsdk_setvars.bat call bin\phpsdk_setvars.bat
        if exist phpsdk_setvars.bat call phpsdk_setvars.bat

        :: 强行切入大图纸所在的物理主目录
        cd /d "C:\php-sdk\php-dev-pack"

        :: 终极加固：如果当前目录没有，强行去 ext\v8js 里也捞一遍，双重保险
        if not exist "Makefile" if exist "ext\v8js\Makefile" move /Y "ext\v8js\Makefile" "Makefile"

        echo [INFO] 正在启动 nmake 清理与构建...
        nmake clean
        nmake
        if %ERRORLEVEL% neq 0 exit /b %ERRORLEVEL%
        echo [SUCCESS] php_v8js.dll 编译成功！

