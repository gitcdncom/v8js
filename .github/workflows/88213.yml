name: Build PHP V8 Extension

on:
  workflow_dispatch:

# ==================== 全局公共配置项（完美一键修改） ====================
env:
  # 1. 编译器与 Visual Studio 工具链配置
  VS_VERSION_GN: "2019"         # 传递给 V8 GN 编译参数的 visual_studio_version
  VS_VERSION_ACTION: "2022"     # ilammy/msvc-dev-cmd 镜像版本
  MSVC_TOOLSET: "14.29"         # 强制加载的 MSVC 编译器工具集版本 (VS2019 最终版)

  # 2. 核心源码与开发包远程地址（此后只需维护并修改这 4 行 URL 即可）
  PHP_ZIP_FILE_NAME: "php-devel-pack-8.2.13-Win32-vs16-x64.zip"            # 下载到本地保存的压缩包全名
  PHP_DEVEL_PACK_ORIGINAL_DIR: "php-8.2.13-devel-vs16-x64"            # 解压出来的原始根目录名称
  PHP_DEVEL_PACK_URL: "https://php.net"
  DEPOT_TOOLS_URL: "https://googlesource.com"
  SDK_BINARYTOOLS_URL: "https://github.com"
  V8_SRC_URL: "https://googlesource.com"
  V8JS_EXT_URL: "https://github.com"

  # 3. 全局本地公共目录定义
  PHP_SDK_ROOT: "C:\\php-sdk"
  PHP_DEV_PACK_DIR: "C:\\php-sdk\\php-dev-pack"
  PHP_DEV_TEMP_DIR: "C:\\php-sdk\\php-dev-temp"
  V8_DEPS_DIR: "D:\\v8-deps"
  V8_DEPS_DIRLIB: "D:\\v8-deps\\lib"
  V8_DEPS_DIRINC: "D:\\v8-deps\\include"
  V8_DEPS_DIRLIB_2: "D:\\v8-deps\\lib\\"
  V8_DEPS_DIRINC_2: "D:\\v8-deps\\include\\"
  V8_PDT: "C:/phpdowtemp"
# ====================================================================

jobs:
  build:
    runs-on: windows-2022
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: "安装基础依赖"
      run: |
        choco install re2c --yes --no-progress
        Write-Host "基础依赖安装完成。"

    # ================= 缓存设置开始 =================
    - name: "缓存"
      id: v8-cache
      uses: actions/cache@v4
      with:
        path: |
          ${{ github.workspace }}/depot_tools
          ${{ github.workspace }}/v8-build
        key: v8-build-cache-${{ runner.os }}-v1
        restore-keys: |
          v8-build-cache-${{ runner.os }}-
    # ================= 缓存设置结束 =================

    - name: "添加 MSVC x64 编译环境"
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64
        vsversion: "${{ env.VS_VERSION_ACTION }}"
        toolset: "${{ env.MSVC_TOOLSET }}"

    - name: "下载并安装 Depot Tools（谷歌编译工具）"
      shell: bash
      run: |
        FIXED_WORKSPACE=$(echo "$GITHUB_WORKSPACE" | sed 's/\\/\//g')
        TARGET_DIR="$FIXED_WORKSPACE/depot_tools"
        
        if [ ! -d "$TARGET_DIR/.git" ]; then
          echo "Directory or .git does not exist. Cloning depot_tools..."
          rm -rf "$TARGET_DIR"
          git clone "${{ env.DEPOT_TOOLS_URL }}" "$TARGET_DIR"
        else
          echo "depot_tools already exists, skipping clone."
          cd "$TARGET_DIR"
          cmd.exe /c "gclient" || true
        fi
        echo "$TARGET_DIR" >> $GITHUB_PATH

    - name: "获取 V8 源代码"
      shell: bash
      env:
        DEPOT_TOOLS_WIN_TOOLCHAIN: 0
        WINDOWSSDKDIR: ${{ env.WindowsSdkDir }}
      run: |
        FIXED_WORKSPACE=$(echo "$GITHUB_WORKSPACE" | sed 's/\\/\//g')
        export PATH="$FIXED_WORKSPACE/depot_tools:$PATH"
        
        git config --global depot-tools.allowGlobalGitConfig true
        git config --global core.autocrlf false
        git config --global core.filemode false
        
        mkdir -p "$FIXED_WORKSPACE/v8-build"
        cd "$FIXED_WORKSPACE/v8-build"
        
        echo "solutions = [ { 'name': 'v8', 'url': '${{ env.V8_SRC_URL }}', 'deps_file': 'DEPS', 'managed': False, 'custom_deps': {}, 'custom_vars': {} } ]" > .gclient
        
        echo "启动 V8 依赖链增量自检..."
        gclient sync --no-history
        
        echo "激活 V8 本地构建钩子..."
        gclient runhooks

    - name: "编译 V8（开启全部 WASM 功能）"
      shell: cmd
      env:
        DEPOT_TOOLS_WIN_TOOLCHAIN: 0
      run: |
        set "PATH=%GITHUB_WORKSPACE%\depot_tools;%PATH%"
        set "PYTHONPATH=%GITHUB_WORKSPACE%\depot_tools"
        cd /d "%GITHUB_WORKSPACE%\v8-build\v8"
        call set "PATH=%cd%\buildtools\win;%PATH%"
        
        :: 注入核心参数：关闭沙箱避免 libc++ 冲突，保留全功能 WASM、集成单体静态库
        call gn gen out.gn/x64.release --args="is_debug=false is_component_build=false v8_monolithic=true v8_use_external_startup_data=false v8_enable_i18n_support=true v8_enable_webassembly=true v8_enable_shared_ro_heap=true v8_enable_sandbox=false treat_warnings_as_errors=false target_cpu=\"x64\" is_custom_libcxx=false use_custom_libcxx=false visual_studio_version=\"${{ env.VS_VERSION_GN }}\"" || exit 1
        ninja -C out.gn\x64.release v8_monolith || exit 1

    - name: "整理并导出 V8 编译产物"
      shell: cmd
      run: |
        mkdir "${{ env.V8_DEPS_DIRLIB }}"
        mkdir "${{ env.V8_DEPS_DIRINC }}"
        
        :: 复制单体静态库
        copy /Y "%GITHUB_WORKSPACE%\v8-build\v8\out.gn\x64.release\obj\v8_monolith.lib" "${{ env.V8_DEPS_DIRLIB }}\v8.lib"
        
        :: 复制必要的 V8 暴露头文件
        xcopy /E /I /Y "%GITHUB_WORKSPACE%\v8-build\v8\include" "${{ env.V8_DEPS_DIRINC }}"

    - name: "配置 PHP 开发包与 SDK 环境"
      shell: cmd
      run: |
        mkdir "${{ env.PHP_SDK_ROOT }}"
        mkdir "${{ env.PHP_DEV_TEMP_DIR }}"
        
        :: 下载并解压 PHP 官方 Devel Pack
        curl -fLo "${{ env.PHP_DEV_TEMP_DIR }}\${{ env.PHP_ZIP_FILE_NAME }}" "${{ env.PHP_DEVEL_PACK_URL }}"
        powershell -Command "Expand-Archive -Path '${{ env.PHP_DEV_TEMP_DIR }}\${{ env.PHP_ZIP_FILE_NAME }}' -DestinationPath '${{ env.PHP_DEV_TEMP_DIR }}' -Force"
        
        :: 规范化开发包目录结构
        move "${{ env.PHP_DEV_TEMP_DIR }}\${{ env.PHP_DEVEL_PACK_ORIGINAL_DIR }}" "${{ env.PHP_DEV_PACK_DIR }}"
        
        :: 克隆 PHP-SDK 官方构建工具箱
        git clone "${{ env.SDK_BINARYTOOLS_URL }}" "${{ env.PHP_SDK_ROOT }}\php-sdk-binary-tools"

    - name: "获取并编译 V8js 扩展"
      shell: cmd
      run: |
        :: 进入 PHP 官方开发包扩展源码目录
        cd /d "${{ env.PHP_DEV_PACK_DIR }}\ext"
        git clone "${{ env.V8JS_EXT_URL }}" v8js
        
        :: 唤醒 PHP-SDK 内部环境，开始本地编译
        cd /d "${{ env.PHP_SDK_ROOT }}\php-sdk-binary-tools"
        call phpsdk-vc16-x64.bat -no-extended
        
        :: 切入开发包根目录准备构建
        cd /d "${{ env.PHP_DEV_PACK_DIR }}"
        call phpize
        
        :: 注入 V8 头文件及静态库路径变量，配置编译参数
        call configure --with-v8js="${{ env.V8_DEPS_DIR }}" --with-extra-libs="${{ env.V8_DEPS_DIRLIB }}"
        
        :: 执行编译
        nmake

    - name: "收集并上传生成的 php_v8js.dll"
      uses: actions/upload-artifact@v4
      with:
        name: php_v8js-8.2-msvc2019-x64
        path: ${{ env.PHP_DEV_PACK_DIR }}\x64\Release\php_v8js.dll
