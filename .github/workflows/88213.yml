name: Build PHP V8 Extension

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Chocolatey Dependencies
      run: |
        choco install git python3 totalcmd -y

    # ================= 缓存设置开始 =================
    # 移除具体的 github.sha，使用更宽泛的 key 以支持缓存复用
    - name: Cache Depot Tools and V8 Source
      id: v8-cache
      uses: actions/cache@v4
      with:
        path: |
          ${{ github.workspace }}/depot_tools
          ${{ github.workspace }}/v8-build
        key: v8-build-cache-${{ runner.os }}-v1
        restore-keys: |
          v8-build-cache-${{ runner.os }}-
    # ================= 缓存设置结束 =================

    - name: Download and Setup Depot Tools
      shell: bash
      run: |
        FIXED_WORKSPACE=$(echo "$GITHUB_WORKSPACE" | sed 's/\\/\//g')
        TARGET_DIR="$FIXED_WORKSPACE/depot_tools"
        if [ ! -d "$TARGET_DIR/.git" ]; then
          echo "Directory or .git does not exist. Cloning depot_tools..."
          rm -rf "$FIXED_WORKSPACE/depot_tools"
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git "$FIXED_WORKSPACE/depot_tools"
        else
            echo "depot_tools already exists, skipping clone."
        fi
        echo "$FIXED_WORKSPACE/depot_tools" >> $GITHUB_PATH

    - name: Fetch V8 Source Code
      shell: bash
      env:
        DEPOT_TOOLS_WIN_TOOLCHAIN: 0
      run: |
        FIXED_WORKSPACE=$(echo "$GITHUB_WORKSPACE" | sed 's/\\/\//g')
        export PATH="$FIXED_WORKSPACE/depot_tools:$PATH"
        git config --global depot-tools.allowGlobalGitConfig true
        git config --global core.autocrlf false
        git config --global core.filemode false
        
        # 即使命中缓存，如果丢失了必要配置也需要重新初始化，而非直接跳过
        mkdir -p "$FIXED_WORKSPACE/v8-build"
        cd "$FIXED_WORKSPACE/v8-build"
        if [ ! -f ".gclient" ]; then
          gclient config --unmanaged https://chromium.googlesource.com/v8/v8.git
        fi
        gclient sync
        gclient runhooks

    - name: Build V8 Engine
      shell: cmd
      env:
        DEPOT_TOOLS_WIN_TOOLCHAIN: 0
      run: |
        set "PATH=%GITHUB_WORKSPACE%\depot_tools;%PATH%"
        set "PYTHONPATH=%GITHUB_WORKSPACE%\depot_tools"
        cd /d "%GITHUB_WORKSPACE%\v8-build\v8"
        call set "PATH=%cd%\buildtools\win;%PATH%"
        call gn gen out.gn/x64.release --args="is_debug=false is_component_build=false v8_monolithic=true v8_use_external_startup_data=false v8_enable_i18n_support=true v8_enable_webassembly=true treat_warnings_as_errors=false target_cpu=\"x64\" visual_studio_version=\"2019\"" || exit 1
        ninja -C out.gn\x64.release v8_monolith

    - name: Setup PHP SDK and Pull PHP 8.2.13 Devel Pack
      shell: cmd
      run: |
        if not exist C:\php-sdk git clone https://github.com/php/php-sdk-binary-tools.git C:\php-sdk
        curl -LO https://downloads.php.net/~windows/releases/archives/php-devel-pack-8.2.13-Win32-vs16-x64.zip
        powershell -Command "Expand-Archive php-devel-pack-8.2.13-Win32-vs16-x64.zip -DestinationPath C:\php-sdk\php-dev-temp"
        if exist C:\php-sdk\php-dev-pack rmdir /S /Q C:\php-sdk\php-dev-pack
        move C:\php-sdk\php-dev-temp\php-8.2.13-devel-v16-x64 C:\php-sdk\php-dev-pack

    - name: Prepare V8 Libraries for PHP Extension
      shell: cmd
      run: |
        cd /d "%GITHUB_WORKSPACE%\v8-build\v8"
        if exist D:\v8-deps rmdir /S /Q D:\v8-deps
        mkdir D:\v8-deps\lib
        mkdir D:\v8-deps\include
        xcopy /S /Y "include\*" D:\v8-deps\include\
        copy "out.gn\x64.release\obj\v8_monolith.lib" D:\v8-deps\lib\
        if exist out.gn\x64.release\icudtl.dat copy out.gn\x64.release\icudtl.dat D:\v8-deps\lib\
        if exist out.gn\x64.release\snapshot_blob.bin copy out.gn\x64.release\snapshot_blob.bin D:\v8-deps\lib\

    - name: Add MSVC x64 Environment
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64
        vsversion: "2022"
        toolset: "14.29"

    - name: Clone PHP V8Js Extension Source
      shell: cmd
      run: |
        cd /d C:\php-sdk\php-dev-pack || exit 1
        if not exist ext mkdir ext
        if exist ext\v8js rmdir /S /Q ext\v8js
        git clone https://github.com/phpv8/v8js.git ext\v8js

    # 将设置变量与构建脚本合并在单步骤的同一个上下文执行，避免环境变量在步骤间丢失
    - name: Configure PHP Build Environment
      shell: cmd
      run: |
        cd /d C:\php-sdk || exit 1
        if exist bin\phpsdk_setvars.bat call bin\phpsdk_setvars.bat
        if exist phpsdk_setvars.bat call phpsdk_setvars.bat
        cd /d C:\php-sdk\php-dev-pack || exit 1
        call buildconf.bat --force || exit 1
        call configure.bat --with-v8js=shared --with-v8-dir=D:\v8-deps --enable-debug=no || exit 1

    # 将设置变量与 nmake 清理、编译合并在单步骤内执行
    - name: Run NMAKE Compilation
      shell: cmd
      run: |
        cd /d C:\php-sdk || exit 1
        if exist bin\phpsdk_setvars.bat call bin\phpsdk_setvars.bat
        if exist phpsdk_setvars.bat call phpsdk_setvars.bat
        cd /d C:\php-sdk\php-dev-pack || exit 1
        nmake clean
        nmake || exit 1
        
    - name: Archive Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: php-8.2.13-v8-wasm-dll
        path: |
          C:/php-sdk/php-dev-pack/Release*/php_v8js.dll
        if-no-files-found: error
