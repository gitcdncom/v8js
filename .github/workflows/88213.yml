name: Build PHP V8 Extension

on:
  workflow_dispatch:

# ==================== 全局公共配置项（完美一键修改） ====================
env:
  # 1. 编译器与 Visual Studio 工具链配置
  VS_VERSION_GN: "2019"         # 传递给 V8 GN 编译参数的 visual_studio_version
  VS_VERSION_ACTION: "2022"     # ilammy/msvc-dev-cmd 镜像版本
  MSVC_TOOLSET: "14.29"         # 强制加载的 MSVC 编译器工具集版本 (VS2019 最终版)

  # 2. 核心源码与开发包远程地址（此后只需维护并修改这 4 行 URL 即可）
  PHP_ZIP_FILE_NAME: "php-devel-pack-8.2.13-Win32-vs16-x64.zip"            # 下载到本地保存的压缩包全名
  PHP_DEVEL_PACK_ORIGINAL_DIR: "php-8.2.13-devel-vs16-x64"            # 解压出来的原始根目录名称
  PHP_DEVEL_PACK_URL: "https://downloads.php.net/~windows/releases/archives/php-devel-pack-8.2.13-Win32-vs16-x64.zip"
  DEPOT_TOOLS_URL: "https://chromium.googlesource.com/chromium/tools/depot_tools.git"
  SDK_BINARYTOOLS_URL: "https://github.com/php/php-sdk-binary-tools.git"
  V8_SRC_URL: "https://chromium.googlesource.com/v8/v8.git"
  V8JS_EXT_URL: "https://github.com/phpv8/v8js.git"

  # 3. 全局本地公共目录定义
  PHP_SDK_ROOT: "C:\\php-sdk"
  PHP_DEV_PACK_DIR: "C:\\php-sdk\\php-dev-pack"
  PHP_DEV_TEMP_DIR: "C:\\php-sdk\\php-dev-temp"
  V8_DEPS_DIR: "D:\\v8-deps"
  V8_DEPS_DIRLIB: "D:\\v8-deps\\lib"
  V8_DEPS_DIRINC: "D:\\v8-deps\\include"
  V8_DEPS_DIRLIB_2: "D:\\v8-deps\\lib\\"
  V8_DEPS_DIRINC_2: "D:\\v8-deps\\include\\"
  V8_PDT: "C:/phpdowtemp"
# ====================================================================

jobs:
  build:
    runs-on: windows-2022
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: "安装依赖"
      shell: powershell
      run: |
        choco install re2c winflexbison3 --yes --no-progress

    # ================= 缓存设置开始 =================
    - name: "缓存"
      id: v8-cache
      uses: actions/cache@v4
      with:
        path: |
          ${{ github.workspace }}/depot_tools
          ${{ github.workspace }}/v8-build
        key: v8-build-cache-${{ runner.os }}-v1
        restore-keys: |
          v8-build-cache-${{ runner.os }}-
    # ================= 缓存设置结束 =================

    - name: "添加 MSVC x64 编译环境"
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64
        vsversion: "${{ env.VS_VERSION_ACTION }}" 
        toolset: "${{ env.MSVC_TOOLSET }}" 

    - name: "配置环境变量与准备 Depot Tools"
      shell: powershell
      run: |
        # 创建工作目录
        New-Item -ItemType Directory -Force -Path "${{ env.V8_DEPS_DIRLIB }}"
        New-Item -ItemType Directory -Force -Path "${{ env.V8_DEPS_DIRINC }}"
        New-Item -ItemType Directory -Force -Path "${{ env.PHP_DEV_TEMP_DIR }}"

        # 下载并配置 Depot Tools
        if (-not (Test-Path "${{ github.workspace }}/depot_tools")) {
            git clone ${{ env.DEPOT_TOOLS_URL }} "${{ github.workspace }}/depot_tools"
        }
        $env:DEPOT_TOOLS_WIN_TOOLCHAIN = "0"
        $env:GYP_MSVS_VERSION = "${{ env.VS_VERSION_GN }}"
        
        # 将 depot_tools 写入系统 PATH 供后续步骤使用
        Add-Content $env:GITHUB_PATH "${{ github.workspace }}/depot_tools"

    - name: "同步 V8 源码并编译"
      shell: powershell
      env:
        DEPOT_TOOLS_WIN_TOOLCHAIN: "0"
        GYP_MSVS_VERSION: "2019"
      run: |
        # 强制配置不使用内置工具链
        $env:PATH = "${{ github.workspace }}/depot_tools;" + $env:PATH
        
        if (-not (Test-Path "${{ github.workspace }}/v8-build")) {
            New-Item -ItemType Directory -Force -Path "${{ github.workspace }}/v8-build"
            cd "${{ github.workspace }}/v8-build"
            gclient config --name=v8 ${{ env.V8_SRC_URL }}
            gclient sync
        } else {
            cd "${{ github.workspace }}/v8-build/v8"
            git fetch
        }

        # 进入 v8 源码目录编译
        cd "${{ github.workspace }}/v8-build/v8"
        
        # 使用 GN 生成构建配置 (单文件模式以契合 V8Js)
        gn gen out.gn/x64.release --args="is_debug=false target_cpu=\"x64\" visual_studio_version=\"${{ env.VS_VERSION_GN }}\" v8_monolithic=true v8_use_external_startup_data=false is_component_build=false"
        
        # 编译单体静态库
        ninja -C out.gn/x64.release v8_monolith

        # 整理 V8 头文件与库文件到目标全局变量目录
        Copy-Item -Path "out.gn/x64.release/obj/v8_monolith.lib" -Destination "${{ env.V8_DEPS_DIRLIB }}/v8.lib" -Force
        Copy-Item -Path "include" -Destination "${{ env.V8_DEPS_DIR }}" -Recurse -Force

    - name: "配置 PHP 开发包"
      shell: powershell
      run: |
        Invoke-WebRequest -Uri "${{ env.PHP_DEVEL_PACK_URL }}" -OutFile "${{ env.PHP_DEV_TEMP_DIR }}\${{ env.PHP_ZIP_FILE_NAME }}"
        Expand-Archive -Path "${{ env.PHP_DEV_TEMP_DIR }}\${{ env.PHP_ZIP_FILE_NAME }}" -DestinationPath "${{ env.PHP_DEV_TEMP_DIR }}" -Force
        
        # 重命名并移动到统一的全局开发包路径
        Move-Item -Path "${{ env.PHP_DEV_TEMP_DIR }}\${{ env.PHP_DEVEL_PACK_ORIGINAL_DIR }}" -Destination "${{ env.PHP_DEV_PACK_DIR }}" -Force

    - name: "编译 PHP V8Js 扩展"
      shell: cmd
      run: |
        :: 克隆 V8Js 源码
        git clone ${{ env.V8JS_EXT_URL }} C:\v8js-src
        cd C:\v8js-src

        :: 依赖 PHP 官方工具包生成的 config.w32 配置环境
        :: 传递 V8 库和头文件路径给配置脚本
        phpize
        configure --with-v8js="${{ env.V8_DEPS_DIR }}" --with-php-build="${{ env.PHP_DEV_PACK_DIR }}"
        
        :: 执行编译
        nmake

    - name: "上传生成的扩展二进制"
      uses: actions/upload-artifact@v4
      with:
        name: php_v8js-php8.2-x64
        path: C:\v8js-src\x64\Release\php_v8js.dll
