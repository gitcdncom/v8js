name: Build PHP V8 Extension

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Chocolatey Dependencies
      run: |
        choco install git python3 totalcmd -y

    - name: Download and Setup Depot Tools
      shell: bash
      run: |
        git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git "$GITHUB_WORKSPACE/depot_tools"
        echo "$GITHUB_WORKSPACE/depot_tools" >> $GITHUB_PATH
        
    - name: Fetch V8 Source Code
      shell: bash
      env:
        DEPOT_TOOLS_WIN_TOOLCHAIN: 0
      run: |
        # 激活 depot_tools 的内部特定变量
        export PATH="$GITHUB_WORKSPACE/depot_tools:$PATH"
        gclient config --unmanaged https://chromium.googlesource.com/v8/v8.git
        gclient sync

    - name: Build V8 Engine
      shell: cmd
      run: |
        cd v8
        call python3 tools\dev\v8gen.py x64.release -- is_component_build=true v8_use_snapshot=true v8_enable_i18n_support=false
        ninja -C out.gn\x64.release v8 v8_libbase v8_libplatform

    - name: Setup PHP SDK and Pull PHP 8.2.13 Devel Pack
      shell: cmd
      run: |
        git clone https://github.com/php/php-sdk-binary-tools.git C:\php-sdk
        curl -LO https://downloads.php.net/~windows/releases/archives/php-devel-pack-8.2.13-Win32-vs16-x64.zip
        powershell Expand-Archive php-devel-pack-8.2.13-Win32-vs16-x64.zip -DestinationPath C:\php-sdk\php-devel-pack

    - name: Prepare V8 Libraries for PHP Extension
      shell: cmd
      run: |
        # 建立标准的 lib 和 include 目录供 PHP 识别
        mkdir D:\v8-deps\lib
        mkdir D:\v8-deps\include
        xcopy /S /Y v8\include\* D:\v8-deps\include\
        copy v8\out.gn\x64.release\*.lib D:\v8-deps\lib\
        copy v8\out.gn\x64.release\*.dll D:\v8-deps\lib\

    - name: Compile PHP V8 Extension
      shell: cmd
      run: |
        git clone https://github.com/phpv8/v8js.git C:\php-sdk\php-devel-pack\php-8.2.13-devel-v16-x64\ext\v8js
        # 使用单个 cmd 组合命令串联环境，解决上下文丢失问题
        call C:\php-sdk\phpsdk-vs16-x64.bat && cd /d C:\php-sdk\php-devel-pack\php-8.2.13-devel-v16-x64 && call buildconf.bat && call configure.bat --with-v8js=shared --with-v8-dir=D:\v8-deps && nmake

    - name: Archive Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: php-8.2.13-v8-dll
        path: |
          C:\php-sdk\php-devel-pack\php-8.2.13-devel-v16-x64\x64\Release_TS\php_v8js.dll
          v8\out.gn\x64.release\v8.dll
