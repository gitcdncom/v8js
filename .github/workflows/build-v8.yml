name: Build PHP V8 Extension

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Chocolatey Dependencies
      run: |
        choco install git python3 totalcmd -y

    - name: Download and Setup Depot Tools
      shell: bash
      run: |
        # 修复：Windows 下 bash 的 $GITHUB_WORKSPACE 包含反斜杠，必须将其转换为正斜杠，彻底根除 \a 转义 Bug
        FIXED_WORKSPACE=$(echo "$GITHUB_WORKSPACE" | sed 's/\\/\//g')
        git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git "$FIXED_WORKSPACE/depot_tools"
        
        # 将正斜杠路径写入 GITHUB_PATH，保证后续步骤调用无误
        echo "$FIXED_WORKSPACE/depot_tools" >> $GITHUB_PATH
        
    - name: Fetch V8 Source Code
      shell: bash
      env:
        DEPOT_TOOLS_WIN_TOOLCHAIN: 0
      run: |
        # 修复：同样将工作区路径转换为正斜杠
        FIXED_WORKSPACE=$(echo "$GITHUB_WORKSPACE" | sed 's/\\/\//g')
        export PATH="$FIXED_WORKSPACE/depot_tools:$PATH"
        
        # 修复：强制初始化全局 Git 配置，彻底根除 CIPD 客户端读取配置引发的 exit status 128 崩溃
        git config --global depot-tools.allowGlobalGitConfig true
        git config --global core.autocrlf false
        git config --global core.filemode false
        
        gclient config --unmanaged https://chromium.googlesource.com/v8/v8.git
        gclient sync

    - name: Build V8 Engine
      shell: cmd
      run: |
        # 修复：由于上面使用的是正斜杠相对路径，这里需要进入正确的 V8 源码目录
        cd /d "%GITHUB_WORKSPACE%\depot_tools"
        cd ../v8
        call python3 tools\dev\v8gen.py x64.release -- is_component_build=true v8_use_snapshot=true v8_enable_i18n_support=false
        ninja -C out.gn\x64.release v8 v8_libbase v8_libplatform

    - name: Setup PHP SDK and Pull PHP 8.2.13 Devel Pack
      shell: cmd
      run: |
        git clone https://github.com/php/php-sdk-binary-tools.git C:\php-sdk
        curl -LO https://downloads.php.net/~windows/releases/archives/php-devel-pack-8.2.13-Win32-vs16-x64.zip
        powershell Expand-Archive php-devel-pack-8.2.13-Win32-vs16-x64.zip -DestinationPath C:\php-sdk\php-devel-pack

    - name: Prepare V8 Libraries for PHP Extension
      shell: cmd
      run: |
        # 修复：精准锁定 V8 编译产物所在的绝对路径进行拷贝
        cd /d "%GITHUB_WORKSPACE%"
        cd ../v8
        set V8_OUT_DIR=%cd%
        
        mkdir D:\v8-deps\lib
        mkdir D:\v8-deps\include
        xcopy /S /Y "%V8_OUT_DIR%\include\*" D:\v8-deps\include\
        copy "%V8_OUT_DIR%\out.gn\x64.release\*.lib" D:\v8-deps\lib\
        copy "%V8_OUT_DIR%\out.gn\x64.release\*.dll" D:\v8-deps\lib\

    # 修复：必须在此步骤前引入微软官方的 MSVC 编译器环境。
    # 否则在下一步执行完 phpsdk-vs16-x64.bat 后，Actions 虚拟机会因为环境隔离，直接报“找不到 cl.exe”从而引发 Exit code 1 中断。
    - name: Add MSVC x64 Environment
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64
        vsversion: "2022"

    - name: Compile PHP V8 Extension
      shell: cmd
      run: |
        # 修复：Devel Pack 官方包内没有全量源码配置链，不能运行 buildconf.bat。
        # 必须先将开发包工具箱内的 phpize.bat 所在路径临时加入 PATH，然后用 phpize 初始化编译。
        set PATH=C:\php-sdk\php-devel-pack\php-8.2.13-devel-v16-x64;%PATH%
        
        git clone https://github.com/phpv8/v8js.git C:\php-sdk\v14-v8js
        cd /d C:\php-sdk\v14-v8js
        
        # 使用单个 cmd 进程依次执行：初始化、配置、编译
        call phpize && call configure --with-v8js=shared --with-v8-dir=D:\v8-deps && nmake

    - name: Archive Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: php-8.2.13-v8-dll
        path: |
          C:\php-sdk\v14-v8js\x64\Release_TS\php_v8js.dll
          D:\a\v8js\v8\out.gn\x64.release\v8.dll
