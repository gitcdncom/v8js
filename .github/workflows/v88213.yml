name: Build PHP V8 Extension

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Chocolatey Dependencies
      run: |
        choco install git python3 totalcmd -y

    # ================= 缓存设置开始 =================
    - name: Cache Depot Tools and V8 Source
      id: v8-cache
      uses: actions/cache@v4
      with:
        path: |
          ${{ github.workspace }}/depot_tools
          ${{ github.workspace }}/v8-build
        key: v8-build-cache-${{ runner.os }}-${{ github.sha }}
        restore-keys: |
          v8-build-cache-${{ runner.os }}-
        save-always: true
    # ================= 缓存设置结束 =================

    - name: Download and Setup Depot Tools
      shell: bash
      run: |
        FIXED_WORKSPACE=$(echo "$GITHUB_WORKSPACE" | sed 's/\\/\//g') # 11
        TARGET_DIR="$FIXED_WORKSPACE/depot_tools"
        if [ ! -d "$TARGET_DIR/.git" ]; then
          echo "Directory or .git does not exist. Cloning depot_tools..."
          rm -rf "$TARGET_DIR"
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git "$FIXED_WORKSPACE/depot_tools" # 11
        else
            echo "depot_tools already exists, skipping clone."
        fi
        echo "$FIXED_WORKSPACE/depot_tools" >> $GITHUB_PATH # 11

    - name: Fetch V8 Source Code
      if: steps.v8-cache.outputs.cache-hit != 'true'
      shell: bash
      env:
        DEPOT_TOOLS_WIN_TOOLCHAIN: 0
      run: |
        FIXED_WORKSPACE=$(echo "$GITHUB_WORKSPACE" | sed 's/\\/\//g')
        export PATH="$FIXED_WORKSPACE/depot_tools:$PATH"
        git config --global depot-tools.allowGlobalGitConfig true
        git config --global core.autocrlf false
        git config --global core.filemode false
        mkdir -p "$FIXED_WORKSPACE/v8-build"
        cd "$FIXED_WORKSPACE/v8-build"
        gclient config --unmanaged https://chromium.googlesource.com/v8/v8.git
        gclient sync
        gclient runhooks

    - name: Build V8 Engine
      shell: cmd
      env:
        DEPOT_TOOLS_WIN_TOOLCHAIN: 0
      run: |
        set "PATH=%GITHUB_WORKSPACE%\depot_tools;%PATH%"
        set "PYTHONPATH=%GITHUB_WORKSPACE%\depot_tools"
        cd /d "%GITHUB_WORKSPACE%\v8-build\v8"
        call set "PATH=%cd%\buildtools\win;%PATH%"
        call gn gen out.gn/x64.release --args="is_debug=false is_component_build=false v8_monolithic=true v8_use_external_startup_data=false v8_enable_i18n_support=false v8_enable_webassembly=true treat_warnings_as_errors=false target_cpu=\"x64\""
        ninja -C out.gn\x64.release v8_monolith

    - name: Setup PHP SDK and Pull PHP 8.2.13 Devel Pack
      shell: cmd
      run: |
        git clone https://github.com/php/php-sdk-binary-tools.git C:\php-sdk
        curl -LO https://downloads.php.net/~windows/releases/archives/php-devel-pack-8.2.13-Win32-vs16-x64.zip
        powershell Expand-Archive php-devel-pack-8.2.13-Win32-vs16-x64.zip -DestinationPath C:\php-sdk\php-devel-pack

    - name: Prepare V8 Libraries for PHP Extension
      shell: cmd
      run: |
        cd /d "%GITHUB_WORKSPACE%\v8-build\v8"
        set V8_OUT_DIR=%cd%
        mkdir D:\v8-deps\lib
        mkdir D:\v8-deps\include
        xcopy /S /Y "%V8_OUT_DIR%\include\*" D:\v8-deps\include\
        copy "%V8_OUT_DIR%\out.gn\x64.release\obj\v8_monolith.lib" D:\v8-deps\lib\

    - name: Add MSVC x64 Environment
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64
        vsversion: "2019" # 必须改为Visual Studio 2019 (VS16)，从而完美匹配 php-8.2.13-Win32-vs16

    - name: Compile PHP V8 Extension
      shell: cmd
      run: |
        set PATH=C:\php-sdk\php-devel-pack\php-8.2.13-devel-v16-x64;%PATH%
        cd /d C:\php-sdk\php-devel-pack\php-8.2.13-devel-v16-x64
        git clone https://github.com/phpv8/v8js.git ext\v8js
        call buildconf
        call configure --with-v8js=shared --with-v8-dir=D:\v8-deps
        nmake

    - name: Archive Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: php-8.2.13-v8-wasm-dll
        path: |
          C:\php-sdk\php-devel-pack\php-8.2.13-devel-v16-x64\**\php_v8js.dll
